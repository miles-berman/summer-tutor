<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Website Maker</title>

<!-- highlight.js: theme + library (loaded before the app script below) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
  :root {
    --bg:      #fff6ec;
    --panel:   #ffffff;
    --ink:     #2b2b3a;
    --muted:   #8a8699;
    --accent:  #ff6b6b;
    --accent2: #1fb6a6;
    --line:    #efe6da;
    --radius:  14px;
    --font: ui-rounded, "SF Pro Rounded", "Nunito", "Segoe UI", system-ui, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    display: flex;
    flex-direction: column;
  }

  /* ---------- top bar ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 12px 18px;
    background: var(--panel);
    border-bottom: 3px solid var(--line);
  }
  .logo {
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .logo span { color: var(--accent2); }

  select, button {
    font-family: var(--font);
    font-size: 0.95rem;
    border-radius: 10px;
    border: 2px solid var(--line);
    padding: 8px 12px;
    background: #fff;
    color: var(--ink);
    cursor: pointer;
  }
  select { font-weight: 700; max-width: 220px; }
  button { font-weight: 700; border: none; }
  button:disabled { opacity: 0.4; cursor: default; }
  button:disabled:active { transform: none; }
  button:active { transform: translateY(1px); }
  .btn-primary  { background: var(--accent);  color: #fff; }
  .btn-second   { background: var(--accent2); color: #fff; }
  .btn-ghost    { background: #f3eee6; color: var(--ink); }
  .btn-danger   { background: #fff; color: var(--accent); border: 2px solid var(--accent); }

  .spacer { flex: 1; }
  .status {
    font-size: 0.85rem;
    color: var(--muted);
    white-space: nowrap;
    min-width: 110px;
    text-align: right;
  }

  /* ---------- main split ---------- */
  main {
    flex: 1;
    display: flex;
    min-height: 0;
  }
  .editor-col, .preview-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }
  .editor-col { border-right: 3px solid var(--line); }

  .tabs { display: flex; gap: 6px; padding: 10px 12px 0; background: var(--panel); }
  .tab {
    border: none;
    border-radius: 10px 10px 0 0;
    background: #f3eee6;
    color: var(--muted);
    padding: 9px 18px;
    font-weight: 800;
    font-size: 0.95rem;
  }
  .tab.active { background: var(--ink); color: #fff; }

  /* ---------- editor: highlighted backdrop + transparent textarea ----------
     A real <textarea> sits on top of a <pre><code> that highlight.js paints.
     The textarea's own text is transparent (only its caret shows), so what
     you read is the colored backdrop underneath. Both layers MUST share the
     same font metrics, padding, wrapping and scrollbar gutter or the glyphs
     drift out of alignment. */
  .editor-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    background: var(--ink);
  }
  .editor-wrap.hidden { display: none; }

  .editor-wrap pre.hl,
  .editor-wrap textarea.code {
    position: absolute;
    inset: 0;
    margin: 0;
    padding: 16px;
    border: none;
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.55;
    tab-size: 2;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: break-word;
    scrollbar-gutter: stable;
  }

  textarea.code {
    outline: none;
    resize: none;
    background: transparent;
    color: transparent;        /* hide the textarea's own glyphs */
    caret-color: #f4f0ff;      /* ...but keep a visible caret */
    overflow: auto;
    z-index: 1;
  }
  textarea.code::selection { background: rgba(120,150,255,0.35); }

  pre.hl {
    overflow: hidden;          /* scrolled programmatically to mirror the textarea */
    z-index: 0;
    pointer-events: none;
    color: #f4f0ff;            /* fallback color before/if hljs doesn't load */
  }
  pre.hl code {
    display: block;
    font: inherit;
    line-height: inherit;
    white-space: inherit;
    overflow-wrap: inherit;
    word-break: inherit;
  }
  /* strip highlight.js' own box styling so only its colors take effect */
  pre.hl code.hljs {
    padding: 0;
    background: transparent;
    overflow: visible;
  }

  .preview-head {
    padding: 12px 16px;
    background: var(--panel);
    font-weight: 800;
    color: var(--muted);
    font-size: 0.9rem;
    border-bottom: 2px solid var(--line);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent2); }
  iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
  }

  .help {
    padding: 8px 18px;
    background: #fff;
    border-top: 2px solid var(--line);
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
  }

  /* ---------- modal ---------- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(43,43,58,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 50;
  }
  .overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 18px;
    padding: 26px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  }
  .modal h2 { margin: 0 0 4px; color: var(--accent); }
  .modal p { margin: 0 0 16px; color: var(--muted); font-size: 0.9rem; }
  .modal input {
    width: 100%;
    font-family: var(--font);
    font-size: 1.05rem;
    padding: 12px 14px;
    border: 2px solid var(--line);
    border-radius: 10px;
    margin-bottom: 6px;
  }
  .modal .err { color: var(--accent); font-size: 0.82rem; min-height: 18px; margin-bottom: 8px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  @media (max-width: 820px) {
    main { flex-direction: column; }
    .editor-col { border-right: none; border-bottom: 3px solid var(--line); }
    .editor-wrap { min-height: 220px; }
    iframe { min-height: 220px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Website <span>Maker</span></div>
  <select id="siteSelect" title="Switch website"></select>
  <button class="btn-ghost" id="newBtn">+ New</button>
  <button class="btn-ghost" id="undoBtn" title="Undo (Ctrl+Z)">&#8630; Undo</button>
  <button class="btn-ghost" id="redoBtn" title="Redo (Ctrl+Y)">&#8631; Redo</button>
  <div class="spacer"></div>
  <button class="btn-second" id="downloadBtn">Download this site</button>
  <button class="btn-ghost" id="downloadAllBtn">Download all</button>
  <button class="btn-danger" id="deleteBtn" title="Delete this website">Delete</button>
  <div class="status" id="status">&nbsp;</div>
</header>

<main>
  <div class="editor-col">
    <div class="tabs">
      <button class="tab active" data-pane="html">index.html</button>
      <button class="tab" data-pane="css">styles.css</button>
    </div>

    <div class="editor-wrap" id="htmlWrap">
      <pre class="hl" aria-hidden="true"><code id="htmlHL" class="language-xml"></code></pre>
      <textarea class="code" id="htmlCode" spellcheck="false"></textarea>
    </div>

    <div class="editor-wrap hidden" id="cssWrap">
      <pre class="hl" aria-hidden="true"><code id="cssHL" class="language-css"></code></pre>
      <textarea class="code" id="cssCode" spellcheck="false"></textarea>
    </div>
  </div>

  <div class="preview-col">
    <div class="preview-head"><span class="dot"></span> Live preview</div>
    <iframe id="preview" sandbox="allow-scripts" title="Live preview"></iframe>
  </div>
</main>

<div class="help">
  Your work saves automatically in this browser. <strong>Tab</strong> indents,
  <strong>Shift+Tab</strong> un-indents, and typing <code>&gt;</code> after a tag closes it for you.
  When you're done, click <strong>Download this site</strong>.
</div>

<!-- naming modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Name your website</h2>
    <p>This becomes your website's folder name.</p>
    <input id="nameInput" placeholder="e.g. my-cool-site" autocomplete="off" />
    <div class="err" id="nameErr">&nbsp;</div>
    <div class="modal-actions">
      <button class="btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn-primary" id="createBtn">Create</button>
    </div>
  </div>
</div>

<script>
/* =========================================================
   Website Maker — fully client-side. No backend, no server.
   Each kid's work is saved in their own browser (localStorage).
   (Syntax highlighting is the one network asset: highlight.js
   from cdnjs. If it fails to load, the editor falls back to
   plain monospace text — nothing else breaks.)
   ========================================================= */

// ---- starter content for a brand-new site ----
const STARTER_HTML = [
  "<!DOCTYPE html>",
  "<html lang=\"en\">",
  "<head>",
  "  <meta charset=\"UTF-8\" />",
  "  <title>My Website<\/title>",
  "  <link rel=\"stylesheet\" href=\"styles.css\" />",
  "<\/head>",
  "<body>",
  "",
  "  <header>",
  "    <h1>Hi, I'm Your Name<\/h1>",
  "    <p class=\"tagline\">I make cool stuff on the internet.<\/p>",
  "  <\/header>",
  "",
  "  <main>",
  "    <section>",
  "      <h2>About Me<\/h2>",
  "      <p>Write a sentence or two about yourself here.<\/p>",
  "    <\/section>",
  "",
  "    <section>",
  "      <h2>Things I Like<\/h2>",
  "      <ul>",
  "        <li>Video games<\/li>",
  "        <li>Drawing<\/li>",
  "        <li>Building websites<\/li>",
  "      <\/ul>",
  "    <\/section>",
  "  <\/main>",
  "",
  "  <footer>",
  "    <p>Made by Your Name<\/p>",
  "  <\/footer>",
  "",
  "<\/body>",
  "<\/html>",
  ""
].join("\n");

const STARTER_CSS = [
  "/* Change these colors and watch the whole page change! */",
  ":root {",
  "  --bg: #fdf6e3;",
  "  --text: #333;",
  "  --accent: #e85d75;",
  "}",
  "",
  "body {",
  "  margin: 0;",
  "  background: var(--bg);",
  "  color: var(--text);",
  "  font-family: system-ui, sans-serif;",
  "  line-height: 1.6;",
  "}",
  "",
  "header, main, footer {",
  "  max-width: 700px;",
  "  margin: 0 auto;",
  "  padding: 0 20px;",
  "}",
  "",
  "header { text-align: center; padding-top: 50px; }",
  "h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 0; }",
  ".tagline { font-size: 1.2rem; opacity: 0.8; }",
  "h2 { color: var(--accent); border-bottom: 3px solid var(--accent); padding-bottom: 6px; }",
  "footer { text-align: center; padding: 40px 0; opacity: 0.6; }",
  ""
].join("\n");

// ---- storage (falls back to memory if localStorage is blocked) ----
const mem = {};
const store = {
  get(k){ try { return localStorage.getItem(k); } catch(e){ return (k in mem) ? mem[k] : null; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch(e){ mem[k] = v; } },
  del(k){ try { localStorage.removeItem(k); } catch(e){ delete mem[k]; } },
  keys(){ try { return Object.keys(localStorage); } catch(e){ return Object.keys(mem); } }
};
const PREFIX = "kidweb:site:";
const ACTIVE = "kidweb:active";

// ---- helpers ----
function slugify(name){
  let s = name.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  return s || "site";
}
function uniqueSlug(base){
  let slug = base, n = 2;
  while (store.get(PREFIX + slug) !== null) { slug = base + "-" + n; n++; }
  return slug;
}
function listSites(){
  return store.keys()
    .filter(k => k.startsWith(PREFIX))
    .map(k => { try { return JSON.parse(store.get(k)); } catch(e){ return null; } })
    .filter(Boolean)
    .sort((a,b) => (a.name||"").localeCompare(b.name||""));
}
function getSite(slug){
  const raw = store.get(PREFIX + slug);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch(e){ return null; }
}
function saveSite(site){ store.set(PREFIX + site.slug, JSON.stringify(site)); }

// ---- CRC32 + ZIP (store method, no compression, no libraries) ----
const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++){ let c = n; for (let k = 0; k < 8; k++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1; t[n] = c >>> 0; }
  return t;
})();
function crc32(bytes){ let crc = -1; for (let i = 0; i < bytes.length; i++) crc = (crc >>> 8) ^ CRC_TABLE[(crc ^ bytes[i]) & 0xFF]; return (crc ^ -1) >>> 0; }
function makeZip(files){
  const enc = new TextEncoder(); const chunks = []; let offset = 0;
  const push = a => { chunks.push(a); offset += a.length; };
  const central = [];
  for (const f of files){
    const nameBytes = enc.encode(f.name), dataBytes = enc.encode(f.content), crc = crc32(dataBytes), lho = offset;
    const h = new Uint8Array(30 + nameBytes.length), dv = new DataView(h.buffer);
    dv.setUint32(0,0x04034b50,true); dv.setUint16(4,20,true); dv.setUint16(6,0x0800,true); dv.setUint16(8,0,true);
    dv.setUint16(10,0,true); dv.setUint16(12,0x21,true); dv.setUint32(14,crc,true);
    dv.setUint32(18,dataBytes.length,true); dv.setUint32(22,dataBytes.length,true);
    dv.setUint16(26,nameBytes.length,true); dv.setUint16(28,0,true); h.set(nameBytes,30);
    push(h); push(dataBytes); central.push({ nameBytes, crc, size: dataBytes.length, lho });
  }
  const cdStart = offset;
  for (const c of central){
    const r = new Uint8Array(46 + c.nameBytes.length), dv = new DataView(r.buffer);
    dv.setUint32(0,0x02014b50,true); dv.setUint16(4,20,true); dv.setUint16(6,20,true); dv.setUint16(8,0x0800,true);
    dv.setUint16(10,0,true); dv.setUint16(12,0,true); dv.setUint16(14,0x21,true); dv.setUint32(16,c.crc,true);
    dv.setUint32(20,c.size,true); dv.setUint32(24,c.size,true); dv.setUint16(28,c.nameBytes.length,true);
    dv.setUint16(30,0,true); dv.setUint16(32,0,true); dv.setUint16(34,0,true); dv.setUint16(36,0,true);
    dv.setUint32(38,0,true); dv.setUint32(42,c.lho,true); r.set(c.nameBytes,46); push(r);
  }
  const cdSize = offset - cdStart;
  const e = new Uint8Array(22), dv = new DataView(e.buffer);
  dv.setUint32(0,0x06054b50,true); dv.setUint16(4,0,true); dv.setUint16(6,0,true);
  dv.setUint16(8,central.length,true); dv.setUint16(10,central.length,true);
  dv.setUint32(12,cdSize,true); dv.setUint32(16,cdStart,true); dv.setUint16(20,0,true); push(e);
  const out = new Uint8Array(offset); let p = 0; for (const ch of chunks){ out.set(ch, p); p += ch.length; }
  return out;
}
function downloadBytes(filename, bytes){
  const blob = new Blob([bytes], { type: "application/zip" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ---- preview: inject the CSS into the HTML, render in sandboxed iframe ----
function buildPreview(html, css){
  const styleTag = "<style>\n" + css + "\n<\/style>";
  if (/<\/head>/i.test(html)) return html.replace(/<\/head>/i, styleTag + "</head>");
  if (/<body[^>]*>/i.test(html)) return html.replace(/(<body[^>]*>)/i, "$1" + styleTag);
  return styleTag + html;
}

// ---- app state + elements ----
let activeSlug = null;
let activePane = "html";
const el = {
  select: document.getElementById("siteSelect"),
  status: document.getElementById("status"),
  html: document.getElementById("htmlCode"),
  css: document.getElementById("cssCode"),
  htmlWrap: document.getElementById("htmlWrap"),
  cssWrap: document.getElementById("cssWrap"),
  preview: document.getElementById("preview"),
  overlay: document.getElementById("overlay"),
  nameInput: document.getElementById("nameInput"),
  nameErr: document.getElementById("nameErr"),
  modalTitle: document.getElementById("modalTitle"),
};

// ---- syntax highlighting backdrop (highlight.js) ----
// Each textarea maps to the <code> element it paints into + its language.
const HL = new Map([
  [el.html, { code: document.getElementById("htmlHL"), lang: "xml" }],
  [el.css,  { code: document.getElementById("cssHL"),  lang: "css" }],
]);
function highlightInto(t){
  const cfg = HL.get(t);
  if (!cfg) return;
  if (window.hljs){
    cfg.code.innerHTML = hljs.highlight(t.value, { language: cfg.lang, ignoreIllegal: true }).value;
  } else {
    cfg.code.textContent = t.value;   // graceful fallback if the CDN is unreachable
  }
  // mirror the textarea's scroll so the colored layer stays under the caret
  const pre = cfg.code.parentElement;
  pre.scrollTop = t.scrollTop;
  pre.scrollLeft = t.scrollLeft;
}
function syncHighlights(){ highlightInto(el.html); highlightInto(el.css); }
el.html.addEventListener("scroll", () => highlightInto(el.html));
el.css.addEventListener("scroll", () => highlightInto(el.css));

function refreshSiteList(){
  const sites = listSites();
  el.select.innerHTML = "";
  for (const s of sites){
    const opt = document.createElement("option");
    opt.value = s.slug;
    opt.textContent = s.name + "  (" + s.slug + "/)";  // textContent => safe, no HTML injection
    if (s.slug === activeSlug) opt.selected = true;
    el.select.appendChild(opt);
  }
}

function loadSite(slug){
  const site = getSite(slug);
  if (!site) return;
  activeSlug = slug;
  store.set(ACTIVE, slug);
  el.html.value = site.html;
  el.css.value = site.css;
  hist.html.reset();
  hist.css.reset();
  refreshSiteList();
  updatePreview();
  syncHighlights();
  setStatus("All changes saved");
}

let saveTimer = null;
function setStatus(t){ el.status.textContent = t; }
function scheduleSave(){
  setStatus("Saving…");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const site = getSite(activeSlug);
    if (!site) return;
    site.html = el.html.value;
    site.css = el.css.value;
    site.updated = Date.now();
    saveSite(site);
    setStatus("All changes saved");
  }, 400);
}

let previewTimer = null;
function updatePreview(){
  clearTimeout(previewTimer);
  previewTimer = setTimeout(() => {
    el.preview.srcdoc = buildPreview(el.html.value, el.css.value);
  }, 200);
}

function onCodeInput(){ scheduleSave(); updatePreview(); syncHighlights(); }
el.html.addEventListener("input", onCodeInput);
el.css.addEventListener("input", onCodeInput);

/* =========================================================
   Smart editing
   - Tab / Shift+Tab: indent & dedent, snapped to a 2-space
     grid. Works on single carets and multi-line selections.
   - Enter: keeps the current indentation; goes one level
     deeper after an opening tag or "{", and expands empty
     blocks (>|</  and  {|}) onto three neat lines.
   - Backspace: deletes indentation back to the previous tab
     stop, and removes empty pairs like "" or {} in one press.
   - Auto-close: typing ">" after any opening tag inserts the
     matching closing tag (generic — works for every tag, void
     elements like <br> and <img> are skipped). "{", "(", "[",
     quotes auto-pair, typing the closer skips over an existing
     one, and typing "=" inside a tag gives you ="" ready to fill.
   - Undo / Redo: a custom per-file history (Ctrl+Z / Ctrl+Y
     or the header buttons). Typing groups into one step;
     each smart edit is its own step.
   ========================================================= */
const INDENT = "  ";
const VOID_TAGS = new Set(["area","base","br","col","embed","hr","img","input",
                           "link","meta","param","source","track","wbr"]);
const PAIRS = { "{": "}", "(": ")", "[": "]", '"': '"', "'": "'" };
const CLOSERS = new Set(["}", ")", "]", '"', "'"]);

// ---- undo/redo history (one per file) ----
function makeHistory(t){
  const MAX = 200;
  let stack = [{ v: t.value, s: 0, e: 0 }];
  let idx = 0, timer = null;

  const snap = () => ({ v: t.value, s: t.selectionStart, e: t.selectionEnd });

  function commitNow(){
    clearTimeout(timer); timer = null;
    if (t.value === stack[idx].v) return;
    stack = stack.slice(0, idx + 1);     // typing after an undo clears the redo trail
    stack.push(snap());
    if (stack.length > MAX) stack.shift();
    idx = stack.length - 1;
    updateUndoButtons();
  }
  // group rapid typing into a single undo step
  function commitSoon(){
    clearTimeout(timer);
    timer = setTimeout(commitNow, 350);
    updateUndoButtons();
  }
  function restore(st){
    t.value = st.v;
    t.focus();
    t.setSelectionRange(st.s, st.e);
    onCodeInput();
    updateUndoButtons();
  }
  function undo(){
    commitNow();                          // flush in-flight typing first
    if (idx === 0) return;
    idx--;
    restore(stack[idx]);
  }
  function redo(){
    if (t.value !== stack[idx].v){ commitNow(); return; } // pending edits invalidate redo
    if (idx >= stack.length - 1) return;
    idx++;
    restore(stack[idx]);
  }
  function reset(){
    clearTimeout(timer); timer = null;
    stack = [{ v: t.value, s: 0, e: 0 }];
    idx = 0;
    updateUndoButtons();
  }
  return {
    commitNow, commitSoon, undo, redo, reset,
    canUndo: () => idx > 0 || t.value !== stack[idx].v,
    canRedo: () => idx < stack.length - 1 && t.value === stack[idx].v,
  };
}

// Single edit primitive. Flushes pending typing first so every
// smart edit lands as exactly one undo step.
function applyEdit(t, start, end, text, caret, caretEnd){
  const h = histFor(t);
  h.commitNow();
  t.focus();
  t.setRangeText(text, start, end, "end");
  if (caret != null) t.setSelectionRange(caret, caretEnd != null ? caretEnd : caret);
  onCodeInput();   // setRangeText doesn't fire "input"
  h.commitNow();
}

function installSmartEditor(t, mode){
  const lineStartAt = pos => t.value.lastIndexOf("\n", pos - 1) + 1;
  const lineIndentAt = pos => t.value.slice(lineStartAt(pos)).match(/^ */)[0];

  t.addEventListener("keydown", e => {
    // undo / redo — ours replaces the browser's (setRangeText breaks native undo)
    if ((e.ctrlKey || e.metaKey) && !e.altKey){
      const key = e.key.toLowerCase();
      if (key === "z" && !e.shiftKey){ e.preventDefault(); histFor(t).undo(); return; }
      if (key === "y" || (key === "z" && e.shiftKey)){ e.preventDefault(); histFor(t).redo(); return; }
      return;
    }
    if (e.altKey) return;
    const v = t.value, s = t.selectionStart, en = t.selectionEnd;
    const hasSel = s !== en;
    const before = v.slice(0, s), after = v.slice(en);
    const prev = before.slice(-1), next = after.charAt(0);
    const k = e.key;

    // ---- Tab / Shift+Tab: indent & dedent, snapped to the grid ----
    if (k === "Tab"){
      e.preventDefault();
      const spansLines = v.slice(s, en).includes("\n");
      if (e.shiftKey || spansLines){
        // line-wise: from start of first line to end of last selected line
        const ls = lineStartAt(s);
        // if the selection ends right after a newline, don't drag in the next line
        const enAdj = (hasSel && en > s && v[en - 1] === "\n") ? en - 1 : en;
        const nl = v.indexOf("\n", enAdj);
        const le = nl === -1 ? v.length : nl;
        const lines = v.slice(ls, le).split("\n");
        const out = e.shiftKey
          ? lines.map(l => l.replace(/^ {1,2}/, "")).join("\n")   // dedent one stop
          : lines.map(l => l.length ? INDENT + l : l).join("\n"); // indent one stop
        applyEdit(t, ls, le, out, ls, ls + out.length);
      } else {
        // single caret: insert just enough spaces to reach the next tab stop
        const col = s - lineStartAt(s);
        applyEdit(t, s, en, " ".repeat(INDENT.length - (col % INDENT.length)));
      }
      return;
    }

    // ---- Enter: auto-indent + block expansion ----
    if (k === "Enter" && !hasSel){
      const indent = lineIndentAt(s);
      const expandHTML = mode === "html" && prev === ">" && after.startsWith("<\/");
      const expandCSS  = mode === "css"  && prev === "{" && next === "}";
      if (expandHTML || expandCSS){
        // <h1>|</h1>  or  h1 {|}  →  open it up onto three lines
        e.preventDefault();
        const ins = "\n" + indent + INDENT + "\n" + indent;
        applyEdit(t, s, en, ins, s + 1 + indent.length + INDENT.length);
        return;
      }
      let extra = "";
      if (mode === "css" && prev === "{") extra = INDENT;
      if (mode === "html"){
        const m = before.match(/<([a-zA-Z][a-zA-Z0-9-]*)(\s[^<>]*)?>$/);
        if (m && !VOID_TAGS.has(m[1].toLowerCase()) && !before.endsWith("/>")) extra = INDENT;
      }
      e.preventDefault();
      applyEdit(t, s, en, "\n" + indent + extra);
      return;
    }

    // ---- Backspace: snap-delete indentation, remove empty pairs ----
    if (k === "Backspace" && !hasSel){
      if (prev && PAIRS[prev] === next){
        e.preventDefault();
        applyEdit(t, s - 1, s + 1, "");
        return;
      }
      const ls = lineStartAt(s);
      if (s > ls && /^ +$/.test(v.slice(ls, s))){
        const col = s - ls;
        const del = col % INDENT.length || INDENT.length;
        e.preventDefault();
        applyEdit(t, s - del, s, "");
        return;
      }
      return;
    }

    if (k.length !== 1) return;

    // ---- typing a closer that's already there: just step over it ----
    if (!hasSel && CLOSERS.has(k) && next === k){
      e.preventDefault();
      t.setSelectionRange(s + 1, s + 1);
      return;
    }

    // ---- ">" closes the tag you just opened (generic, any tag) ----
    if (mode === "html" && k === ">" && !hasSel){
      const lt = before.lastIndexOf("<");
      if (lt !== -1){
        const frag = before.slice(lt);
        const m = frag.match(/^<([a-zA-Z][a-zA-Z0-9-]*)(\s[^<>]*)?$/);
        if (m && !VOID_TAGS.has(m[1].toLowerCase()) && !frag.endsWith("/")){
          e.preventDefault();
          applyEdit(t, s, en, "><\/" + m[1] + ">", s + 1);
          return;
        }
      }
    }

    // ---- "=" inside a tag gives href="" with the cursor ready ----
    if (mode === "html" && k === "=" && !hasSel){
      const lt = before.lastIndexOf("<"), gt = before.lastIndexOf(">");
      if (lt > gt && v.charAt(lt + 1) !== "/" && /[a-zA-Z-]$/.test(before)){
        e.preventDefault();
        applyEdit(t, s, en, '=""', s + 2);
        return;
      }
    }

    // ---- "}" on an empty line tucks itself back one level ----
    if (mode === "css" && k === "}" && !hasSel){
      const ls = lineStartAt(s);
      const lineSoFar = v.slice(ls, s);
      if (/^ +$/.test(lineSoFar) && lineSoFar.length >= INDENT.length){
        e.preventDefault();
        applyEdit(t, s - INDENT.length, s, "}");
        return;
      }
    }

    // ---- wrap a selection in brackets/quotes ----
    if (hasSel && PAIRS[k]){
      e.preventDefault();
      applyEdit(t, s, en, k + v.slice(s, en) + PAIRS[k], s + 1, en + 1);
      return;
    }

    // ---- auto-pair brackets and quotes ----
    if (!hasSel && PAIRS[k]){
      // don't pair an apostrophe mid-word ("I'm", "don't")
      if (k === "'" && /[a-zA-Z0-9]/.test(prev)) return;
      // only pair when something sensible follows (end of line, space, closer…)
      if (next === "" || /[\s)\]}>,;.<]/.test(next)){
        e.preventDefault();
        applyEdit(t, s, en, k + PAIRS[k], s + 1);
        return;
      }
    }
  });
}

installSmartEditor(el.html, "html");
installSmartEditor(el.css, "css");

// ---- undo/redo wiring ----
const hist = { html: makeHistory(el.html), css: makeHistory(el.css) };
function histFor(t){ return t === el.html ? hist.html : hist.css; }
function activeHist(){ return activePane === "html" ? hist.html : hist.css; }

const undoBtn = document.getElementById("undoBtn");
const redoBtn = document.getElementById("redoBtn");

function updateUndoButtons(){
  const h = activeHist();
  undoBtn.disabled = !h.canUndo();
  redoBtn.disabled = !h.canRedo();
}

// group plain typing into undo steps
el.html.addEventListener("input", () => hist.html.commitSoon());
el.css.addEventListener("input", () => hist.css.commitSoon());

// keep focus in the editor when clicking the buttons
for (const b of [undoBtn, redoBtn]) b.addEventListener("mousedown", e => e.preventDefault());
undoBtn.addEventListener("click", () => activeHist().undo());
redoBtn.addEventListener("click", () => activeHist().redo());

// buttons reflect whichever file is showing
document.querySelectorAll(".tab").forEach(tab => tab.addEventListener("click", updateUndoButtons));
updateUndoButtons();

// pane tabs
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    activePane = tab.dataset.pane;
    document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t === tab));
    el.htmlWrap.classList.toggle("hidden", activePane !== "html");
    el.cssWrap.classList.toggle("hidden", activePane !== "css");
  });
});

el.select.addEventListener("change", () => loadSite(el.select.value));

// ---- new-site modal ----
function openModal(){
  el.nameInput.value = "";
  el.nameErr.textContent = "\u00a0";
  el.overlay.classList.add("show");
  el.nameInput.focus();
}
function closeModal(){ el.overlay.classList.remove("show"); }

document.getElementById("newBtn").addEventListener("click", openModal);
document.getElementById("cancelBtn").addEventListener("click", () => {
  // don't allow cancelling if there are no sites yet
  if (listSites().length > 0) closeModal();
});
document.getElementById("createBtn").addEventListener("click", createFromModal);
el.nameInput.addEventListener("keydown", e => { if (e.key === "Enter") createFromModal(); });

function createFromModal(){
  const raw = el.nameInput.value.trim();
  if (!raw){ el.nameErr.textContent = "Please type a name."; return; }
  const slug = uniqueSlug(slugify(raw));
  const site = { slug, name: raw, html: STARTER_HTML, css: STARTER_CSS, updated: Date.now() };
  saveSite(site);
  closeModal();
  loadSite(slug);
  activePane = "html";
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", i === 0));
  el.htmlWrap.classList.remove("hidden");
  el.cssWrap.classList.add("hidden");
}

// ---- delete ----
document.getElementById("deleteBtn").addEventListener("click", () => {
  const site = getSite(activeSlug);
  if (!site) return;
  if (!confirm('Delete "' + site.name + '"? This cannot be undone.')) return;
  store.del(PREFIX + activeSlug);
  const rest = listSites();
  if (rest.length){ loadSite(rest[0].slug); }
  else { activeSlug = null; openModal(); el.modalTitle.textContent = "Name your website"; }
});

// ---- downloads ----
document.getElementById("downloadBtn").addEventListener("click", () => {
  const site = getSite(activeSlug);
  if (!site) return;
  const zip = makeZip([
    { name: site.slug + "/index.html", content: el.html.value },
    { name: site.slug + "/styles.css", content: el.css.value },
  ]);
  downloadBytes(site.slug + ".zip", zip);
});

document.getElementById("downloadAllBtn").addEventListener("click", () => {
  const sites = listSites();
  if (!sites.length) return;
  const files = [];
  for (const s of sites){
    files.push({ name: s.slug + "/index.html", content: s.html });
    files.push({ name: s.slug + "/styles.css", content: s.css });
  }
  downloadBytes("all-sites.zip", makeZip(files));
});

// ---- boot ----
(function init(){
  const sites = listSites();
  if (!sites.length){
    el.modalTitle.textContent = "Name your website";
    openModal();
    return;
  }
  const saved = store.get(ACTIVE);
  loadSite(getSite(saved) ? saved : sites[0].slug);
})();
</script>
</body>
</html>
